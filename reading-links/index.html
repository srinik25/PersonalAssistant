<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reading List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #f5f3ef; color: #1e1e1e; min-height: 100vh; }

    header { background: #1e1e1e; color: white; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-family: 'Playfair Display', serif; font-size: 1.25rem; font-weight: 800; }
    .add-btn { background: #d4a373; color: #1e1e1e; border: none; padding: 8px 18px; border-radius: 50px; font-size: 0.82rem; font-weight: 700; cursor: pointer; transition: background 0.2s; }
    .add-btn:hover { background: #e8c49a; }

    .tabs { background: white; border-bottom: 1px solid #e0dcd6; display: flex; flex-wrap: wrap; gap: 0; padding: 4px 16px 0; }
    .tab { background: none; border: none; padding: 8px 12px; font-size: 0.88rem; font-weight: 600; color: #999; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.15s; }
    .tab.active { color: #1e1e1e; border-bottom-color: #d4a373; }
    .tab .cnt { display: inline-block; background: #f0ece6; color: #888; border-radius: 50px; padding: 0 6px; font-size: 0.7rem; margin-left: 4px; }
    .tab.active .cnt { background: #d4a373; color: #1e1e1e; }
    .tab-suggested { color: #2d7a4f; }
    .tab-suggested.active { border-bottom-color: #2d7a4f; }
    .tab-suggested.active .cnt { background: #2d7a4f; color: white; }

    .panel { max-width: 800px; margin: 0 auto; padding: 16px 20px; }
    .empty { text-align: center; padding: 40px; color: #bbb; font-size: 0.88rem; font-style: italic; }

    /* Compact card */
    .card { background: white; border-radius: 8px; padding: 10px 14px; margin-bottom: 6px;
            border: 1px solid #ebe7e0; display: flex; align-items: center; gap: 12px;
            transition: box-shadow 0.15s; }
    .card:hover { box-shadow: 0 1px 8px rgba(0,0,0,0.07); }
    .card-body { flex: 1; min-width: 0; }
    .card-title { font-size: 0.88rem; font-weight: 600; color: #1e1e1e; white-space: nowrap;
                  overflow: hidden; text-overflow: ellipsis; }
    .card-title a { color: inherit; text-decoration: none; }
    .card-title a:hover { color: #8b5e3c; }
    .card-meta { font-size: 0.72rem; color: #aaa; margin-top: 2px; }
    .card-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-read    { background: none; border: none; color: #ccc; padding: 4px 6px; font-size: 1rem; line-height: 1; cursor: pointer; transition: color 0.15s; }
    .btn-read:hover    { color: #b94040; }
    .btn-archive { background: #f0ece6; color: #8b5e3c; border: 1px solid #d4bfa8; padding: 4px 10px; border-radius: 50px; font-size: 0.72rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .btn-archive:hover { background: #8b5e3c; color: white; }
    .btn-delete  { background: #fdf0f0; color: #b94040; border: 1px solid #e8c0c0; padding: 4px 10px; border-radius: 50px; font-size: 0.72rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .btn-delete:hover  { background: #b94040; color: white; }
    .btn-restore { background: #f0ece6; color: #555; border: 1px solid #d4d0ca; padding: 4px 10px; border-radius: 50px; font-size: 0.72rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .btn-restore:hover { background: #555; color: white; }
    .btn-keep { background: #eaf4ee; color: #2d7a4f; border: 1px solid #b5dfc5; padding: 4px 10px; border-radius: 50px; font-size: 0.72rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .btn-keep:hover { background: #2d7a4f; color: white; }
    .suggest-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .btn-refresh { background: #eaf4ee; color: #2d7a4f; border: 1px solid #b5dfc5; padding: 7px 16px; border-radius: 50px; font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .btn-refresh:hover:not(:disabled) { background: #2d7a4f; color: white; }
    .btn-refresh:disabled { opacity: 0.5; cursor: not-allowed; }
    .suggest-status { font-size: 0.75rem; color: #888; }
    .suggest-status.ok  { color: #2d7a4f; }
    .suggest-status.err { color: #b94040; }
    .btn-fav { background: none; border: 1px solid #e0dcd6; color: #bbb; padding: 4px 8px; border-radius: 50px; font-size: 0.78rem; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
    .btn-fav:hover, .btn-fav.active { background: #fff3cd; color: #b8860b; border-color: #f0d080; }
    .btn-edit { background: none; border: 1px solid #e0dcd6; color: #bbb; padding: 4px 8px; border-radius: 50px; font-size: 0.78rem; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
    .btn-edit:hover { background: #f0ece6; color: #555; border-color: #c0bab4; }
    .btn-move { background: none; border: 1px solid #e0dcd6; color: #bbb; padding: 4px 10px; border-radius: 50px; font-size: 0.72rem; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
    .btn-move:hover { background: #f0ece6; color: #555; border-color: #c0bab4; }
    .card { position: relative; }
    .move-picker { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: white; border: 1px solid #e0dcd6; border-radius: 8px; padding: 6px; display: flex; flex-wrap: wrap; gap: 4px; z-index: 10; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .move-picker button { background: #f5f3ef; border: 1px solid #e0dcd6; color: #444; padding: 4px 10px; border-radius: 50px; font-size: 0.72rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .move-picker button:hover { background: #1e1e1e; color: white; border-color: #1e1e1e; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: white; border-radius: 14px; padding: 24px; width: 100%; max-width: 460px; margin: 16px; }
    .modal-box h3 { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 800; margin-bottom: 14px; }
    .modal-box input[type="url"] { width: 100%; padding: 9px 12px; border: 1px solid #d4d0ca; border-radius: 7px; font-size: 0.88rem; outline: none; transition: border 0.2s; }
    .modal-box input[type="url"]:focus { border-color: #d4a373; }
    .modal-status { font-size: 0.78rem; color: #888; margin: 8px 0 0; min-height: 18px; }
    .modal-status.error { color: #b94040; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    .modal-cancel  { background: none; border: 1px solid #d4d0ca; color: #666; padding: 8px 18px; border-radius: 50px; font-size: 0.82rem; font-weight: 600; cursor: pointer; }
    .modal-confirm { background: #1e1e1e; color: white; border: none; padding: 8px 20px; border-radius: 50px; font-size: 0.82rem; font-weight: 700; cursor: pointer; }
    .modal-confirm:disabled { opacity: 0.45; cursor: not-allowed; }

    .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #ccc; border-top-color: #666; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 5px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) { .card { flex-wrap: wrap; } .card-actions { width: 100%; justify-content: flex-end; } }
  </style>
</head>
<body>

<header>
  <h1>Reading List</h1>
  <button class="add-btn" id="open-modal">+ Add Link</button>
</header>

<div class="tabs" id="tabs">
  <button class="tab active" data-tab="physics_cosmos">Physics &amp; Cosmos <span class="cnt" id="cnt-physics_cosmos">0</span></button>
  <button class="tab" data-tab="biology_life">Biology &amp; Life <span class="cnt" id="cnt-biology_life">0</span></button>
  <button class="tab" data-tab="technology">Technology <span class="cnt" id="cnt-technology">0</span></button>
  <button class="tab" data-tab="artificial_intelligence">AI <span class="cnt" id="cnt-artificial_intelligence">0</span></button>
  <button class="tab" data-tab="human_stories">Human Stories <span class="cnt" id="cnt-human_stories">0</span></button>
  <button class="tab" data-tab="health_wellness">Health <span class="cnt" id="cnt-health_wellness">0</span></button>
  <button class="tab" data-tab="exercises">Exercises <span class="cnt" id="cnt-exercises">0</span></button>
  <button class="tab" data-tab="brain">Brain <span class="cnt" id="cnt-brain">0</span></button>
  <button class="tab" data-tab="philosophy">Philosophy <span class="cnt" id="cnt-philosophy">0</span></button>
  <button class="tab" data-tab="personal_growth">Personal Growth <span class="cnt" id="cnt-personal_growth">0</span></button>
  <button class="tab" data-tab="economics_society">Economics <span class="cnt" id="cnt-economics_society">0</span></button>
  <button class="tab" data-tab="travel">Travel <span class="cnt" id="cnt-travel">0</span></button>
  <button class="tab" data-tab="personal_finance">Personal Finance <span class="cnt" id="cnt-personal_finance">0</span></button>
  <button class="tab" data-tab="links">Links <span class="cnt" id="cnt-links">0</span></button>
  <button class="tab" data-tab="other">Other <span class="cnt" id="cnt-other">0</span></button>
  <button class="tab tab-suggested" data-tab="suggested">✦ Suggested <span class="cnt" id="cnt-suggested">0</span></button>
  <button class="tab" data-tab="archive">Archive <span class="cnt" id="cnt-archive">0</span></button>
  <button class="tab" data-tab="favorites">★ Favorites <span class="cnt" id="cnt-favorites">0</span></button>
</div>

<div id="panel-physics_cosmos"       class="panel"></div>
<div id="panel-biology_life"         class="panel" style="display:none"></div>
<div id="panel-technology"           class="panel" style="display:none"></div>
<div id="panel-artificial_intelligence" class="panel" style="display:none"></div>
<div id="panel-human_stories"        class="panel" style="display:none"></div>
<div id="panel-health_wellness"      class="panel" style="display:none"></div>
<div id="panel-exercises"            class="panel" style="display:none"></div>
<div id="panel-brain"               class="panel" style="display:none"></div>
<div id="panel-philosophy"           class="panel" style="display:none"></div>
<div id="panel-personal_growth"      class="panel" style="display:none"></div>
<div id="panel-economics_society"    class="panel" style="display:none"></div>
<div id="panel-travel"               class="panel" style="display:none"></div>
<div id="panel-personal_finance"     class="panel" style="display:none"></div>
<div id="panel-links"                class="panel" style="display:none"></div>
<div id="panel-other"                class="panel" style="display:none"></div>
<div id="panel-suggested"            class="panel" style="display:none"></div>
<div id="panel-archive"              class="panel" style="display:none"></div>
<div id="panel-favorites"            class="panel" style="display:none"></div>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <h3>Add Article</h3>
    <input type="url" id="url-input" placeholder="Paste article URL…" autocomplete="off">
    <input type="text" id="title-input" placeholder="Title (optional — overrides auto-detected)" autocomplete="off" style="width:100%;margin-top:8px;padding:9px 12px;border:1px solid #d4d0ca;border-radius:7px;font-size:0.88rem;outline:none;transition:border 0.2s;" onfocus="this.style.borderColor='#d4a373'" onblur="this.style.borderColor='#d4d0ca'">
    <div class="modal-status" id="modal-status"></div>
    <div class="modal-actions">
      <button class="modal-cancel" id="close-modal">Cancel</button>
      <button class="modal-confirm" id="confirm-add">Add</button>
    </div>
  </div>
</div>
