    };

    function seedAll() {
        log('Starting seed...');
        var now = new Date().toISOString();
        var promises = [];

        // Seed profile
        var profileData = {
            userId: currentUser.uid,
            age: PROFILE.age,
            retirementAge: PROFILE.retirementAge,
            riskTolerance: PROFILE.riskTolerance,
            goals: PROFILE.goals,
            updatedAt: now
        };
        promises.push(
            db.collection('finance_profiles').doc(currentUser.uid).set(profileData, { merge: true })
                .then(function() { log('  ✓ Profile saved'); })
        );

        // Seed accounts
        ACCOUNTS.forEach(function(acct) {
            var data = {
                name: acct.name,
                type: acct.type,
                notes: acct.notes || '',
                funds: acct.funds || [],
                userId: currentUser.uid,
                createdAt: now,
                updatedAt: now
            };
            promises.push(
                db.collection('finance_accounts').add(data).then(function(ref) {
                    log('  ✓ ' + acct.name + ' — $' + sumFunds(acct.funds).toLocaleString() + ' (' + ref.id + ')');
                })
            );
        });

        Promise.all(promises).then(function() {
            log('\nDone! ' + ACCOUNTS.length + ' accounts + profile seeded.');
            log('Go to http://localhost:8080 to see your data.');
        }).catch(function(err) {
            log('\nERROR: ' + err.message);
        });
    }

    function sumFunds(funds) {
        return funds.reduce(function(s, f) { return s + (f.amount || 0); }, 0);
    }

    function clearAll() {
        if (!confirm('Delete ALL finance accounts and profile for local-user? This cannot be undone.')) return;
        log('Clearing all data...');
        db.collection('finance_accounts').where('userId', '==', currentUser.uid).get().then(function(snap) {
            var batch = db.batch();
            snap.forEach(function(doc) { batch.delete(doc.ref); });
            return batch.commit().then(function() { log('  ✓ Deleted ' + snap.size + ' accounts'); });
        }).then(function() {
            return db.collection('finance_profiles').doc(currentUser.uid).delete().then(function() {
                log('  ✓ Deleted profile');
            });
        }).then(function() {
            log('\nAll data cleared.');
        }).catch(function(err) {
            log('ERROR: ' + err.message);
        });
    }
