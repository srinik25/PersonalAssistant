<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f5f7fa; color: #1a2030; min-height: 100vh; }

    /* ── Header ── */
    .site-header { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 0 24px; display: flex; align-items: center; gap: 16px; height: 52px; position: sticky; top: 0; z-index: 100; }
    .site-header h1 { font-family: 'Playfair Display', serif; font-size: 1.65rem; color: #1a2030; flex-shrink: 0; }
    .btn-add-year { background: none; border: 1.5px solid #6366f1; color: #6366f1; font-size: 0.75rem; font-weight: 600; padding: 3px 10px; border-radius: 12px; cursor: pointer; transition: all 0.15s; }
    .btn-add-year:hover { background: #6366f1; color: #fff; }
    .btn-mode-toggle { margin-left: auto; background: #f1f5f9; border: 1.5px solid #e2e8f0; color: #475569; font-size: 0.8rem; font-weight: 700; padding: 5px 14px; border-radius: 12px; cursor: pointer; transition: all 0.15s; letter-spacing: 0.01em; }
    .btn-mode-toggle:hover { background: #e2e8f0; color: #1a2030; }
    body.edit-mode .btn-mode-toggle { background: #6366f1; color: #fff; border-color: #6366f1; }

    /* ── Year tabs ── */
    .year-tabs { background: #fff; border-bottom: 2px solid #e2e8f0; padding: 0 20px; display: flex; gap: 2px; overflow-x: auto; }
    .ytab { background: none; border: none; border-bottom: 3px solid transparent; padding: 10px 16px; font-size: 0.88rem; font-weight: 600; color: #64748b; cursor: pointer; white-space: nowrap; transition: all 0.15s; margin-bottom: -2px; }
    .ytab:hover { color: #6366f1; }
    .ytab.active { color: #6366f1; border-bottom-color: #6366f1; }
    .ytab.backlog-tab { color: #94a3b8; }
    .ytab.backlog-tab.active { color: #f59e0b; border-bottom-color: #f59e0b; }
    .ytab.goals-tab { color: #94a3b8; }
    .ytab.goals-tab.active { color: #10b981; border-bottom-color: #10b981; }

    /* ── Month sub-nav ── */
    .month-nav { background: #f8fafc; border-bottom: 1px solid #e2e8f0; padding: 8px 20px; display: flex; gap: 4px; overflow-x: auto; }
    .mtab { background: none; border: 1px solid transparent; border-radius: 16px; padding: 4px 12px; font-size: 0.88rem; font-weight: 600; color: #64748b; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .mtab:hover { border-color: #c7d2fe; color: #6366f1; }
    .mtab.active { background: #6366f1; color: #fff; border-color: #6366f1; }

    /* ── Layout ── */
    .page-wrap { display: flex; align-items: flex-start; max-width: 1160px; margin: 0 auto; padding: 0 16px; }
    .main { flex: 1; min-width: 0; padding: 24px 20px 80px; }

    /* ── Sidebar ── */
    .sidebar-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 18px 18px 20px; }
    .sidebar-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #94a3b8; margin-bottom: 14px; }
    .sb-row { margin-bottom: 10px; }
    .sb-label { font-size: 0.72rem; font-weight: 600; color: #64748b; margin-bottom: 4px; }
    .sb-select { width: 100%; padding: 8px 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.85rem; font-family: 'Inter', sans-serif; outline: none; background: #f8fafc; color: #1a2030; cursor: pointer; }
    .sb-select:focus { border-color: #6366f1; }
    .sb-input { width: 100%; padding: 9px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.88rem; font-family: 'Inter', sans-serif; outline: none; background: #f8fafc; }
    .sb-input:focus { border-color: #6366f1; background: #fff; }
    .sb-btn { width: 100%; background: #6366f1; color: #fff; border: none; border-radius: 9px; padding: 10px; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: background 0.15s; margin-top: 6px; }
    .sb-btn:hover { background: #4f46e5; }
    .sidebar-divider { border: none; border-top: 1px solid #f1f5f9; margin: 12px 0; }

    /* ── Section headers ── */
    .section-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: #1a2030; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
    .section-title .cnt { font-family: 'Inter', sans-serif; font-size: 0.72rem; font-weight: 600; background: #e0e7ff; color: #6366f1; padding: 2px 7px; border-radius: 8px; }
    .section-divider { border: none; border-top: 1px solid #e2e8f0; margin: 24px 0; }

    /* ── Week header ── */
    .week-header { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #94a3b8; margin: 16px 0 8px; padding: 4px 0 4px 10px; border-left: 3px solid #c7d2fe; display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
    .week-header:hover { color: #6366f1; }
    .week-header::after { content: ' ▾'; font-size: 0.65em; margin-left: 2px; }
    .week-section.collapsed .week-header::after { content: ' ▸'; }
    .week-section.collapsed .task-list { display: none; }
    .week-header .cnt { font-family: 'Inter', sans-serif; font-size: 0.7rem; font-weight: 600; background: #f1f5f9; color: #94a3b8; padding: 1px 6px; border-radius: 6px; }
    .week-header .btn-add-inline { margin-left: auto; }

    /* ── Task list ── */
    .task-list { list-style: none; display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
    .task-item { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px 14px; display: flex; align-items: flex-start; gap: 10px; transition: box-shadow 0.15s; }
    .task-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .task-item.done { opacity: 0.6; background: #f8fafc; }
    .task-item.done .task-title { color: #64748b; }
    .task-done-badge { display: inline-block; font-size: 0.68rem; font-weight: 700; background: #dcfce7; color: #16a34a; border: 1px solid #bbf7d0; border-radius: 5px; padding: 1px 6px; margin-left: 6px; vertical-align: middle; }

    .task-check { width: 18px; height: 18px; border: 2px solid #c7d2fe; border-radius: 5px; cursor: pointer; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .task-check.checked { background: #6366f1; border-color: #6366f1; }
    .task-check.checked::after { content: '✓'; color: #fff; font-size: 0.7rem; font-weight: 700; }

    .task-body { flex: 1; min-width: 0; }
    .task-title { font-size: 0.88rem; font-weight: 500; color: #1a2030; line-height: 1.4; }
    .task-desc { font-size: 0.77rem; color: #64748b; margin-top: 2px; line-height: 1.4; }
    .task-meta { font-size: 0.7rem; color: #94a3b8; margin-top: 3px; }
    .task-linked { display: inline-block; font-size: 0.68rem; background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; border-radius: 5px; padding: 1px 5px; margin-top: 3px; }

    /* ── Important ── */
    .task-item.important { background: #fffbeb; border-color: #fcd34d; }
    .task-item.important .task-title { color: #92400e; }
    .btn-star { background: none; border: none; cursor: pointer; font-size: 1.1rem; padding: 2px 4px; line-height: 1; flex-shrink: 0; color: #d1d5db; transition: color 0.15s, transform 0.12s; }
    .btn-star:hover { color: #f59e0b; transform: scale(1.2); }
    .task-item.important .btn-star { color: #f59e0b; }

    /* View mode (default) — hide edit controls */
    .task-actions { display: none; gap: 4px; flex-shrink: 0; align-items: flex-start; }
    .sidebar { width: 300px; flex-shrink: 0; position: sticky; top: 110px; padding: 16px 0 16px 20px; display: none; }
    /* Edit mode — show edit controls */
    body.edit-mode .task-actions { display: flex; }
    body.edit-mode .sidebar { display: block; }
    .btn-task { background: none; border: none; cursor: pointer; font-size: 0.75rem; color: #cbd5e1; padding: 2px 4px; border-radius: 5px; transition: color 0.15s; }
    .btn-task:hover { color: #6366f1; background: #f1f5f9; }
    .btn-task.del:hover { color: #ef4444; background: #fef2f2; }

    .btn-copy-down { background: none; border: 1px solid #c7d2fe; color: #6366f1; font-size: 0.68rem; font-weight: 600; padding: 2px 7px; border-radius: 8px; cursor: pointer; white-space: nowrap; transition: all 0.15s; flex-shrink: 0; }
    .btn-copy-down:hover { background: #6366f1; color: #fff; }

    /* ── Type groups ── */
    .type-group { margin-bottom: 16px; }
    .type-group-header { font-size: 0.71rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; padding: 3px 0 6px; border-bottom: 2px solid; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .type-cnt { font-size: 0.68rem; font-weight: 600; background: #f1f5f9; color: #64748b; padding: 1px 5px; border-radius: 5px; }


    /* ── Month split layout ── */
    .month-split { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; align-items: flex-start; }
    .month-panel { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 16px 18px 18px; }
    .month-panel-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #94a3b8; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; gap: 8px; }
    .month-panel-title .cnt { font-size: 0.68rem; font-weight: 600; background: #e0e7ff; color: #6366f1; padding: 1px 6px; border-radius: 5px; }
    .weeks-panel { display: flex; flex-direction: column; gap: 12px; }
    .week-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 14px 16px 16px; }
    .week-card-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #94a3b8; margin-bottom: 10px; padding-bottom: 7px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
    .week-card-title:hover { color: #6366f1; }
    .week-card-title .cnt { font-size: 0.68rem; background: #f1f5f9; color: #94a3b8; padding: 1px 5px; border-radius: 5px; font-weight: 600; }
    .week-card-title::after { content: '▾'; font-size: 0.7em; margin-left: auto; }
    .week-card.collapsed .week-card-title::after { content: '▸'; }
    .week-card.collapsed .week-card-body { display: none; }

    /* ── Month notes / comments ── */
    .month-notes-wrap { margin-top: 24px; }
    .month-notes-header { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #94a3b8; margin-bottom: 8px; }
    .month-notes-area { width: 100%; min-height: 110px; padding: 12px 14px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 0.85rem; font-family: 'Inter', sans-serif; color: #1a2030; background: #fafbfc; resize: vertical; outline: none; line-height: 1.6; transition: border-color 0.15s; }
    .month-notes-area:focus { border-color: #6366f1; background: #fff; }
    .month-notes-saved { font-size: 0.7rem; color: #16a34a; margin-top: 4px; height: 14px; transition: opacity 0.3s; }

    /* ── Goals ── */
    .goal-actions { display: flex; gap: 4px; flex-shrink: 0; align-items: flex-start; }
    .btn-add-goal { background: none; border: 1.5px solid #10b981; color: #10b981; font-size: 0.75rem; font-weight: 600; padding: 3px 10px; border-radius: 12px; cursor: pointer; transition: all 0.15s; margin-left: auto; }
    .btn-add-goal:hover { background: #10b981; color: #fff; }
    .goal-done-badge { display: inline-block; font-size: 0.68rem; font-weight: 700; background: #dcfce7; color: #16a34a; border: 1px solid #bbf7d0; border-radius: 5px; padding: 1px 6px; margin-left: 6px; vertical-align: middle; }

    /* ── Archive tab ── */
    .ytab.archive-tab { color: #94a3b8; }
    .ytab.archive-tab.active { color: #f59e0b; border-bottom-color: #f59e0b; }
    .btn-archive-year { background: none; border: 1px solid #e2e8f0; color: #94a3b8; font-size: 0.72rem; font-weight: 600; padding: 3px 10px; border-radius: 10px; cursor: pointer; margin-top: 20px; display: block; transition: all 0.15s; }
    .btn-archive-year:hover { border-color: #f59e0b; color: #f59e0b; }
    .archive-year-section { margin-bottom: 28px; }
    .archive-year-title { font-family: 'Playfair Display', serif; font-size: 1rem; color: #94a3b8; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .btn-unarchive { background: none; border: 1px solid #e2e8f0; color: #94a3b8; font-size: 0.68rem; padding: 2px 8px; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
    .btn-unarchive:hover { border-color: #6366f1; color: #6366f1; }
    .archive-section-label { font-size: 0.72rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.06em; margin: 12px 0 4px; }
    .archive-month-details { border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 8px; overflow: hidden; }
    .archive-month-summary { padding: 8px 12px; cursor: pointer; font-size: 0.85rem; font-weight: 600; color: #475569; display: flex; align-items: center; gap: 8px; list-style: none; }
    .archive-month-summary::-webkit-details-marker { display: none; }
    .archive-month-summary::before { content: '▶'; font-size: 0.6rem; color: #94a3b8; transition: transform 0.15s; }
    .archive-month-details[open] .archive-month-summary::before { transform: rotate(90deg); }
    .archive-month-details[open] { background: #f8fafc; }
    .archive-month-details .type-group, .archive-month-details .task-list { padding: 0 12px; }

    /* ── Backlog ── */
    .backlog-section { margin-bottom: 20px; }

    /* ── Empty state ── */
    .empty { color: #94a3b8; font-size: 0.83rem; font-style: italic; padding: 8px 0; }

    /* ── Progress bar ── */
    .progress-bar-wrap { background: #e2e8f0; border-radius: 4px; height: 5px; margin-bottom: 16px; overflow: hidden; }
    .progress-bar-fill { background: #6366f1; height: 100%; border-radius: 4px; transition: width 0.3s; }

    /* ── Modal ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 200; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: #fff; border-radius: 14px; padding: 26px 28px; width: 100%; max-width: 480px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); }
    .modal-box h3 { font-family: 'Playfair Display', serif; font-size: 1.1rem; margin-bottom: 16px; color: #1a2030; }
    .form-row { margin-bottom: 12px; }
    .form-row label { display: block; font-size: 0.75rem; font-weight: 600; color: #64748b; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
    .form-row input, .form-row textarea, .form-row select { width: 100%; padding: 8px 11px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.85rem; font-family: 'Inter', sans-serif; outline: none; }
    .form-row input:focus, .form-row textarea:focus, .form-row select:focus { border-color: #6366f1; }
    .form-row textarea { height: 72px; resize: vertical; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
    .modal-cancel { background: none; border: 1px solid #e2e8f0; color: #64748b; padding: 7px 16px; border-radius: 8px; cursor: pointer; font-size: 0.83rem; }
    .modal-confirm { background: #6366f1; color: #fff; border: none; padding: 7px 18px; border-radius: 8px; cursor: pointer; font-size: 0.83rem; font-weight: 600; }
    .modal-confirm:hover { background: #4f46e5; }
    .modal-status { font-size: 0.78rem; color: #ef4444; margin-top: 6px; }

    /* ── Copy modal ── */
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }

    /* ── Hidden ── */
    .hidden { display: none !important; }
  </style>
</head>
<body>

<header class="site-header">
  <h1>Tasks</h1>
  <button class="btn-mode-toggle" id="btn-mode-toggle">✏️ Edit Mode</button>
  <button class="btn-add-year" id="btn-add-year">+ Year</button>
</header>

<div class="year-tabs" id="year-tabs">
  <!-- rendered by JS -->
</div>

<div id="month-nav-wrap"></div>

<div class="page-wrap">
  <div class="main" id="main-content"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-card">
      <div class="sidebar-title">Add Task</div>

      <div class="sb-row">
        <div class="sb-label">Add to</div>
        <select class="sb-select" id="sb-level"></select>
      </div>
      <div class="sb-row" id="sb-week-row" style="display:none">
        <div class="sb-label">Week</div>
        <select class="sb-select" id="sb-week">
          <option value="1">Week 1</option>
          <option value="2">Week 2</option>
          <option value="3">Week 3</option>
          <option value="4">Week 4</option>
        </select>
      </div>
      <div class="sb-row">
        <div class="sb-label">Type</div>
        <select class="sb-select" id="sb-type">
          <option value="health">🏃 Health</option>
          <option value="financial">💰 Financial</option>
          <option value="travel">✈️ Travel</option>
          <option value="house">🏠 House</option>
          <option value="garden">🌿 Garden</option>
          <option value="personal">🧘 Personal</option>
          <option value="work">💼 Work</option>
          <option value="other" selected>📌 Other</option>
        </select>
      </div>
      <div class="sb-row">
        <input class="sb-input" id="sb-title" type="text" placeholder="Task title…">
      </div>
      <button class="sb-btn" id="sb-add">+ Add Task</button>
    </div>
  </aside>
</div>

<!-- ── Add / Edit Task Modal ── -->
<div class="modal-overlay" id="task-modal">
  <div class="modal-box">
    <h3 id="task-modal-title">Add Task</h3>
    <div class="form-row">
      <label>Title</label>
      <input type="text" id="t-title" placeholder="What needs to be done?">
    </div>
    <div class="form-row">
      <label>Type</label>
      <select id="t-type">
        <option value="health">🏃 Health</option>
        <option value="financial">💰 Financial</option>
        <option value="travel">✈️ Travel</option>
        <option value="house">🏠 House</option>
        <option value="garden">🌿 Garden</option>
        <option value="personal">🧘 Personal</option>
        <option value="work">💼 Work</option>
        <option value="other" selected>📌 Other</option>
      </select>
    </div>
    <div class="form-row">
      <label>Description <span style="font-weight:400;text-transform:none;">(optional)</span></label>
      <textarea id="t-desc" placeholder="Details, notes…"></textarea>
    </div>
    <div class="modal-status" id="task-modal-status"></div>
    <div class="modal-actions">
      <button class="modal-cancel" id="task-modal-cancel">Cancel</button>
      <button class="modal-confirm" id="task-modal-save">Save</button>
    </div>
  </div>
</div>

<!-- ── Copy Down Modal ── -->
<div class="modal-overlay" id="copy-modal">
  <div class="modal-box">
    <h3>Copy Task To…</h3>
    <div class="form-row">
      <label>Task</label>
      <div id="copy-task-title" style="font-size:0.88rem;font-weight:500;padding:6px 0;"></div>
    </div>
    <div class="form-row-2">
      <div class="form-row" style="margin:0">
        <label>Year</label>
        <select id="copy-year"></select>
      </div>
      <div class="form-row" style="margin:0">
        <label>Level</label>
        <select id="copy-level">
          <option value="month">Month</option>
          <option value="week">Week</option>
        </select>
      </div>
    </div>
    <div class="form-row-2" id="copy-month-week-row">
      <div class="form-row" style="margin:0" id="copy-month-wrap">
        <label>Month</label>
        <select id="copy-month"></select>
      </div>
      <div class="form-row" style="margin:0" id="copy-week-wrap" style="display:none">
        <label>Week</label>
        <select id="copy-week">
          <option value="1">Week 1</option>
          <option value="2">Week 2</option>
          <option value="3">Week 3</option>
          <option value="4">Week 4</option>
          <option value="5">Week 5</option>
        </select>
      </div>
    </div>
    <div class="modal-status" id="copy-modal-status"></div>
    <div class="modal-actions">
      <button class="modal-cancel" id="copy-modal-cancel">Cancel</button>
      <button class="modal-confirm" id="copy-modal-save">Copy</button>
    </div>
  </div>
</div>

<!-- ── Goal Modal ── -->
<div class="modal-overlay" id="goal-modal">
  <div class="modal-box">
    <h3 id="goal-modal-title">Add Goal</h3>
    <div class="form-row">
      <label>Title</label>
      <input type="text" id="g-title" placeholder="What do you want to achieve?">
    </div>
    <div class="form-row">
      <label>Type</label>
      <select id="g-type">
        <option value="health">🏃 Health</option>
        <option value="financial">💰 Financial</option>
        <option value="travel">✈️ Travel</option>
        <option value="house">🏠 House</option>
        <option value="garden">🌿 Garden</option>
        <option value="personal">🧘 Personal</option>
        <option value="work">💼 Work</option>
        <option value="other" selected>📌 Other</option>
      </select>
    </div>
    <div class="form-row">
